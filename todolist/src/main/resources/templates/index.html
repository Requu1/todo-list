<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pl">
<head>
    <title>TODO List</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">

<h1 class="mb-4">TODO List</h1>

<form th:action="@{/add}" th:object="${newTask}" method="post" class="mb-4">

    <div class="d-flex gap-3">
        <input type="text" th:field="*{title}" placeholder="Enter a new task name..."
               class="form-control"
               th:classappend="${#fields.hasErrors('title')} ? 'is-invalid' : ''"
               aria-label="Task name">

        <button type="submit" class="btn btn-primary">Add</button>
    </div>

    <div th:if="${#fields.hasErrors('title')}"
         th:errors="*{title}"
         class="text-danger mt-1 small">
    </div>

</form>

<ul class="list-group">
    <li th:each="task : ${tasks}" class="list-group-item d-flex justify-content-between align-items-center">

        <div class="d-flex align-items-center">
            <form th:action="@{/toggle/{id}(id=${task.id})}" method="post" class="me-3">
                <button type="submit" class="btn btn-sm"
                        th:classappend="${task.completed} ? 'btn-success' : 'btn-outline-secondary'">
                    <span th:text="${task.completed ? '✅ Completed' : '⏳ In progress'}"></span>
                </button>
            </form>

            <span th:text="${task.title}"
                  th:style="${task.completed} ? 'text-decoration: line-through; color: gray;' : ''">
        </span>
        </div>

        <form th:action="@{/delete/{id}(id=${task.id})}" method="post" class="m-0">
            <button type="submit" class="btn btn-danger btn-sm">Delete</button>
        </form>
    </li>
</ul>

</body>
</html>
